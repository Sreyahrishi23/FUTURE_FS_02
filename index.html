<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadDesk — Mini CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
      --border: #2a2a2a; --white: #f0f0ec; --grey: #666; --grey2: #444;
      --new: #3b82f6; --contacted: #f59e0b; --converted: #22c55e;
    }
    body { background: var(--bg); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    header { padding: 24px 48px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: 'DM Mono', monospace; font-size: 1rem; letter-spacing: 0.05em; }
    .logo span { color: var(--grey); }
    .header-tag { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--grey); }
    .app { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 73px); }
    .sidebar { border-right: 1px solid var(--border); padding: 32px 28px; display: flex; flex-direction: column; gap: 32px; }
    .section-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--grey); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .section-label::before { content: ''; display: block; width: 24px; height: 1px; background: var(--grey); }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .stat { border: 1px solid var(--border); padding: 20px 12px; text-align: center; }
    .stat-n { font-family: 'DM Mono', monospace; font-size: 1.8rem; font-weight: 500; line-height: 1; margin-bottom: 6px; }
    .stat-l { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey); }
    .form-fields { display: flex; flex-direction: column; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--grey); }
    input, select { background: var(--surface2); border: 1px solid var(--border); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; padding: 10px 14px; outline: none; width: 100%; transition: border-color 0.2s; }
    input::placeholder { color: var(--grey2); }
    input:focus, select:focus { border-color: var(--grey2); }
    select option { background: var(--surface2); }
    .btn-add { background: var(--white); color: var(--bg); border: none; padding: 12px; font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; width: 100%; transition: opacity 0.2s; margin-top: 4px; }
    .btn-add:hover { opacity: 0.85; }
    .main { padding: 32px 40px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--grey); padding: 8px 18px; font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--white); color: var(--white); }
    .lead-count { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; color: var(--grey); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border); }
    th { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--grey); padding: 12px 16px; text-align: left; font-weight: 400; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:hover { background: var(--surface); }
    td { padding: 16px 16px; font-size: 0.88rem; }
    .td-name { font-weight: 500; }
    .td-email { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--grey); }
    .td-source { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.08em; color: var(--grey); text-transform: uppercase; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .badge-new { background: rgba(59,130,246,0.12); color: var(--new); }
    .badge-contacted { background: rgba(245,158,11,0.12); color: var(--contacted); }
    .badge-converted { background: rgba(34,197,94,0.12); color: var(--converted); }
    .btn-delete { background: transparent; border: 1px solid var(--border); color: var(--grey); padding: 6px 14px; font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .btn-delete:hover { border-color: #ef4444; color: #ef4444; }
    .empty { text-align: center; padding: 80px; color: var(--grey); font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.1em; display: none; }
    footer { padding: 20px 48px; border-top: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em; color: var(--grey); text-align: right; }
    @media (max-width: 800px) { .app { grid-template-columns: 1fr; } .sidebar { border-right: none; border-bottom: 1px solid var(--border); } header, .main { padding: 20px; } }
  </style>
</head>
<body>
<header>
  <div class="logo">Lead<span>Desk</span></div>
  <div class="header-tag">Mini CRM · FUTURE_FS_02</div>
</header>
<div class="app">
  <aside class="sidebar">
    <div>
      <p class="section-label">Overview</p>
      <div class="stats">
        <div class="stat"><div class="stat-n" id="stat-total">0</div><div class="stat-l">Total</div></div>
        <div class="stat"><div class="stat-n" id="stat-contacted" style="color:var(--contacted)">0</div><div class="stat-l">Contacted</div></div>
        <div class="stat"><div class="stat-n" id="stat-converted" style="color:var(--converted)">0</div><div class="stat-l">Converted</div></div>
      </div>
    </div>
    <div>
      <p class="section-label">Add Lead</p>
      <div class="form-fields">
        <div class="form-group"><label>Full Name</label><input type="text" id="in-name" placeholder="e.g. Meera Thomas" /></div>
        <div class="form-group"><label>Email</label><input type="email" id="in-email" placeholder="meera@email.com" /></div>
        <div class="form-group">
          <label>Source</label>
          <select id="in-source">
            <option value="Website">Website</option>
            <option value="LinkedIn">LinkedIn</option>
            <option value="Referral">Referral</option>
            <option value="Instagram">Instagram</option>
            <option value="Cold Outreach">Cold Outreach</option>
            <option value="Event">Event</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="in-status">
            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="converted">Converted</option>
          </select>
        </div>
        <button class="btn-add" onclick="addLead()">+ Add Lead</button>
      </div>
    </div>
  </aside>
  <main class="main">
    <div class="toolbar">
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('new', this)">New</button>
        <button class="filter-btn" onclick="setFilter('contacted', this)">Contacted</button>
        <button class="filter-btn" onclick="setFilter('converted', this)">Converted</button>
      </div>
      <span class="lead-count" id="lead-count">0 leads</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Name</th><th>Email</th><th>Source</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="leads-body"></tbody>
      </table>
      <div class="empty" id="empty">No leads yet. Add one →</div>
    </div>
  </main>
</div>
<footer>FUTURE_FS_02 · Full Stack Web Development Internship · Future Interns</footer>
<script>
  let leads = [];
  let currentFilter = 'all';

  function addLead() {
    const name   = document.getElementById('in-name').value.trim();
    const email  = document.getElementById('in-email').value.trim();
    const source = document.getElementById('in-source').value;
    const status = document.getElementById('in-status').value;
    if (!name || !email) { alert('Name and email are required!'); return; }
    const lead = { id: Date.now(), name, email, source, status, date: new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) };
    leads.unshift(lead);
    saveLeads(); renderLeads(); updateStats();
    document.getElementById('in-name').value = '';
    document.getElementById('in-email').value = '';
  }

  function deleteLead(id) {
    if (!confirm('Delete this lead?')) return;
    leads = leads.filter(l => l.id !== id);
    saveLeads(); renderLeads(); updateStats();
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderLeads();
  }

  function renderLeads() {
    const filtered = currentFilter === 'all' ? leads : leads.filter(l => l.status === currentFilter);
    document.getElementById('lead-count').textContent = `${filtered.length} lead${filtered.length !== 1 ? 's' : ''}`;
    const body = document.getElementById('leads-body');
    const empty = document.getElementById('empty');
    if (!filtered.length) { body.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    body.innerHTML = filtered.map(lead => `
      <tr>
        <td class="td-name">${lead.name}</td>
        <td class="td-email">${lead.email}</td>
        <td class="td-source">${lead.source}</td>
        <td><span class="badge badge-${lead.status}"><span class="badge-dot"></span>${lead.status}</span></td>
        <td><button class="btn-delete" onclick="deleteLead(${lead.id})">Delete</button></td>
      </tr>
    `).join('');
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = leads.length;
    document.getElementById('stat-contacted').textContent = leads.filter(l => l.status === 'contacted').length;
    document.getElementById('stat-converted').textContent = leads.filter(l => l.status === 'converted').length;
  }

  function saveLeads() { localStorage.setItem('crm_leads', JSON.stringify(leads)); }

  function loadLeads() {
    const saved = localStorage.getItem('crm_leads');
    if (saved) { leads = JSON.parse(saved); renderLeads(); updateStats(); }
  }

  loadLeads();
</script>
</body>
</html>
